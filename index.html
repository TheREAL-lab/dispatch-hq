<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#141414">
<title>Dispatch HQ — Texas Gate Dispatch</title>
<!-- DHQ v2.1 command console -->
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--bg:#141414;--panel:#1d1d1d;--line:#2c2c2c;--orange:#ff6a00;--hazard:#ffc400;--dim:#9a9a9a;
--bright:#f2f2f2;--good:#2ecc71;--bad:#ff5c5c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--bright);font-family:'Archivo',system-ui,sans-serif;padding-bottom:84px}
.wrap{max-width:920px;margin:0 auto;padding:0 12px}
header.top{padding:14px 0 10px;border-bottom:4px solid var(--orange);
 background:repeating-linear-gradient(-45deg,transparent 0 14px,rgba(255,196,0,.06) 14px 28px)}
.eyebrow{font-stretch:70%;font-weight:700;letter-spacing:.22em;font-size:10.5px;color:var(--orange);text-transform:uppercase}
h1.site{font-stretch:66%;font-weight:900;font-size:clamp(22px,5vw,32px);text-transform:uppercase;line-height:1}
.who{color:var(--dim);font-size:11.5px;margin-top:3px}
.who a{color:var(--dim)}
nav.main{display:flex;gap:6px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}
nav.main::-webkit-scrollbar{display:none}
nav.main a,nav.main button{font:inherit;font-stretch:70%;font-weight:800;font-size:12.5px;letter-spacing:.07em;
 text-transform:uppercase;padding:9px 13px;border-radius:6px;background:var(--panel);border:1px solid var(--line);
 color:var(--dim);cursor:pointer;white-space:nowrap;text-decoration:none}
nav.main .on{color:#140900;background:var(--orange);border-color:var(--orange)}
nav.main .ext{border-style:dashed}
h2.sec{font-stretch:70%;font-weight:800;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
 color:var(--dim);margin:18px 0 8px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-top:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.kpi .n{font-stretch:66%;font-weight:900;font-size:24px;color:var(--orange)}
.kpi .l{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.bar{height:8px;background:#262626;border-radius:5px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--orange)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.card:hover{border-color:#4a4a4a}
.card .r1{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.card .nm{font-weight:800;font-size:15px}
.card .rt{margin-left:auto;font-size:12px;color:var(--dim);white-space:nowrap}
.card .meta{color:var(--dim);font-size:12px;margin-top:3px}
.card .meta a{color:var(--bright);font-weight:700;text-decoration:none}
.pri{font-size:10px;font-weight:800;letter-spacing:.06em;padding:2px 7px;border-radius:4px;border:1px solid #3a3a3a;color:var(--dim)}
.pri.HOT{border-color:var(--orange);color:var(--orange)}
.pri.WARM{border-color:var(--hazard);color:var(--hazard)}
.pri.STRATEGIC{border-color:#7aa7ff;color:#7aa7ff}
.st{font-size:10px;font-weight:800;letter-spacing:.05em;padding:2px 7px;border-radius:4px;background:#262626;
 border:1px solid #3a3a3a;color:var(--dim);text-transform:uppercase}
.st.approved{border-color:var(--good);color:var(--good)}
.st.cancelled{border-color:var(--bad);color:var(--bad)}
.st.completed,.st.on_site{border-color:var(--hazard);color:var(--hazard)}
.st.dispatched{border-color:var(--orange);color:var(--orange)}
.ok{color:var(--good);font-weight:800}.no{color:var(--bad);font-weight:800}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 10px}
.chips button{font:inherit;font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:14px;background:var(--panel);
 border:1px solid var(--line);color:var(--dim);cursor:pointer}
.chips button.on{border-color:var(--orange);color:var(--orange)}
input,select,textarea{width:100%;padding:10px;background:#111;border:1px solid #3a3a3a;border-radius:6px;
 color:var(--bright);font:inherit;font-size:14px;margin-bottom:8px}
label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;display:block;margin:6px 0 3px}
button.b{font:inherit;font-weight:800;font-size:13px;letter-spacing:.04em;padding:10px 15px;border-radius:6px;
 cursor:pointer;border:1px solid #3a3a3a;background:#262626;color:var(--bright)}
button.b.go{background:var(--orange);border-color:var(--orange);color:#140900}
button.b.warn{border-color:var(--bad);color:var(--bad);background:transparent}
button.b:disabled{opacity:.45}
.row{display:flex;gap:8px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}
.drawer{position:fixed;inset:auto 0 0 0;max-height:88vh;overflow-y:auto;background:#191919;border-top:4px solid var(--orange);
 border-radius:14px 14px 0 0;padding:16px 14px 30px;z-index:50;display:none;box-shadow:0 -10px 40px rgba(0,0,0,.6)}
.drawer.open{display:block}
.drawer .dh{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.drawer .dh .t{font-stretch:70%;font-weight:900;font-size:19px;text-transform:uppercase}
.drawer .x{margin-left:auto;font-size:22px;color:var(--dim);cursor:pointer;background:none;border:none}
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;display:none}
.scrim.open{display:block}
.empty{color:var(--dim);text-align:center;padding:26px 8px;font-size:13.5px}
.note{margin:10px 0;padding:9px 11px;border-left:4px solid var(--hazard);background:#221d0d;color:#ffe9a8;
 font-size:12px;line-height:1.5;border-radius:0 6px 6px 0}
#login{max-width:380px;margin:52px auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:22px}
#login h2{font-stretch:70%;font-weight:900;text-transform:uppercase;margin-bottom:12px}
.err{color:#ff7a7a;font-size:12.5px;min-height:16px;margin-top:6px}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--orange);color:#140900;
 font-weight:800;padding:10px 18px;border-radius:7px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:99;max-width:92%}
.toast.show{opacity:1}
.fab{position:fixed;right:16px;bottom:16px;z-index:30;box-shadow:0 6px 20px rgba(0,0,0,.5)}
table.t{width:100%;border-collapse:collapse;font-size:12.5px}
table.t td,table.t th{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left}
table.t th{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em}
.mut{color:var(--dim);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">Texas Gate Dispatch</div>
    <h1 class="site">Dispatch HQ</h1>
    <div class="who" id="who"></div>
  </header>

  <div id="login" style="display:none">
    <h2 id="lt">Sign in</h2>
    <input id="lem" type="email" placeholder="Email" autocomplete="username">
    <input id="lfn" type="text" placeholder="Full name" style="display:none">
    <input id="lpw" type="password" placeholder="Password" autocomplete="current-password">
    <button class="b go" style="width:100%" onclick="doAuth()">Continue</button>
    <div class="err" id="lerr"></div>
    <div class="mut" style="margin-top:10px;cursor:pointer" onclick="toggleMode()" id="lmode">New hire? Create account</div>
  </div>

  <div id="pending" style="display:none">
    <div class="note" style="margin-top:26px">Account created. You're awaiting approval — the owner will activate your access in the Team tab.</div>
    <button class="b" onclick="signOut()">Sign out</button>
  </div>

  <div id="app" style="display:none">
    <nav class="main" id="nav"></nav>
    <div id="view"></div>
  </div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://teptzyvzuenolwtfosht.supabase.co', SB_KEY='sb_publishable_4LgHf6k24QMus_1nvHPgSg__3rjqh52';
let sb, me={role:null,uid:null,email:null,scope:'all'}, view='command', signup=false;
let F=[], T=[], D=[], O=[], STAFF=[], FEE=89, pipeFilter='queue', jobFilter='active';
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const toast=m=>{const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)};
const fmt=d=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
const PRI_ORD={HOT:0,WARM:1,STANDARD:2,STRATEGIC:3};
const CONVO=['spoke','vendor_on_file','declined','client'];

async function boot(){
  sb=window.supabase.createClient(SB_URL,SB_KEY);
  const {data:{session}}=await sb.auth.getSession();
  if(!session){show('login');return}
  await gate(session);
}
function show(id){['login','pending','app'].forEach(x=>$(x).style.display=x===id?'block':'none')}
async function gate(session){
  me.uid=session.user.id; me.email=session.user.email;
  const {data:role}=await sb.rpc('dhq_role');
  if(!role||role==='pending'){show('pending');return}
  me.role=role;
  const {data:scope}=await sb.rpc('dhq_jobs_scope'); me.scope=scope||'all';
  $('who').innerHTML=esc(me.email)+' · '+esc(me.role)+' · <a href="#" onclick="signOut();return false">sign out</a>';
  show('app'); buildNav(); await loadAll(); render();
}
function toggleMode(){signup=!signup;$('lt').textContent=signup?'Create account':'Sign in';
 $('lfn').style.display=signup?'block':'none';
 $('lmode').textContent=signup?'Have an account? Sign in':'New hire? Create account'}
async function doAuth(){
  $('lerr').textContent='';
  const email=$('lem').value.trim(),pw=$('lpw').value;
  if(signup){
    const {data,error}=await sb.auth.signUp({email,password:pw});
    if(error){$('lerr').textContent=error.message;return}
    if(data.user){try{await sb.from('dispatch_staff').insert({user_id:data.user.id,email,full_name:$('lfn').value.trim(),role:'pending'})}catch(e){}}
    const {data:{session}}=await sb.auth.getSession();
    if(session)await gate(session); else $('lerr').textContent='Check your email to confirm, then sign in.';
  }else{
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){$('lerr').textContent=error.message;return}
    const {data:{session}}=await sb.auth.getSession(); await gate(session);
  }
}
async function signOut(){await sb.auth.signOut();location.reload()}

function buildNav(){
  const owner=me.role==='owner';
  let h=['command','pipeline','jobs','techs','metrics'].map(v=>
    '<button id="nv-'+v+'" onclick="go(\''+v+'\')">'+v+'</button>').join('');
  if(owner)h+='<button id="nv-team" onclick="go(\'team\')">Team</button>'+
              '<button id="nv-settings" onclick="go(\'settings\')">Settings</button>';
  h+='<a class="ext" href="radar.html">Radar</a><a class="ext" href="docs.html">Docs</a>';
  $('nav').innerHTML=h; markNav();
}
function markNav(){document.querySelectorAll('nav.main button').forEach(b=>b.classList.remove('on'));
  const b=$('nv-'+view); if(b)b.classList.add('on')}
function go(v){view=v;markNav();render()}

async function loadAll(){
  const q=[
    sb.from('facilities').select('*'),
    sb.from('techs').select('*'),
    sb.from('dispatches').select('*').order('created_at',{ascending:false}),
    sb.from('outreach_log').select('*').order('contacted_at',{ascending:false}).limit(400),
    sb.from('app_settings').select('*').eq('key','booking_fee_usd')
  ];
  if(me.role==='owner')q.push(sb.from('dispatch_staff').select('*'));
  const r=await Promise.all(q);
  F=r[0].data||[]; T=r[1].data||[]; D=r[2].data||[]; O=r[3].data||[];
  FEE=parseFloat((r[4].data?.[0]?.value)||'89');
  if(me.role==='owner')STAFF=r[5].data||[];
}
async function refresh(){await loadAll();render()}
const fac=id=>F.find(f=>f.id===id)||{}; const tech=id=>T.find(t=>t.id===id)||{};

function render(){
  const v=$('view');
  if(view==='command')v.innerHTML=rCommand();
  else if(view==='pipeline')v.innerHTML=rPipeline();
  else if(view==='jobs')v.innerHTML=rJobs();
  else if(view==='techs')v.innerHTML=rTechs();
  else if(view==='metrics')v.innerHTML=rMetrics();
  else if(view==='team')v.innerHTML=rTeam();
  else if(view==='settings')v.innerHTML=rSettings();
}
function kpis(){
  const today=new Date().toISOString().slice(0,10);
  const callsToday=O.filter(o=>(o.contacted_at||'').slice(0,10)===today).length;
  const convos=F.filter(f=>CONVO.includes(f.call_status)).length;
  const active=D.filter(d=>!['approved','cancelled'].includes(d.status)).length;
  const earned=D.filter(d=>d.status==='approved').reduce((s,d)=>s+(+d.coordination_fee_usd||0),0);
  return {callsToday,convos,active,earned};
}
function rCommand(){
  const k=kpis();
  const due=F.filter(f=>['not_called','no_answer'].includes(f.call_status)||
    (f.follow_up_date&&f.follow_up_date<=new Date().toISOString().slice(0,10)&&f.call_status!=='client'))
    .sort((a,b)=>((a.follow_up_date||'9')> (b.follow_up_date||'9')?1:-1)||(PRI_ORD[a.priority]-PRI_ORD[b.priority])).slice(0,25);
  const act=D.filter(d=>!['approved','cancelled'].includes(d.status));
  return '<div class="kpis">'+
    '<div class="kpi"><div class="n">'+k.callsToday+'</div><div class="l">Calls today</div></div>'+
    '<div class="kpi"><div class="n">'+k.convos+'<span style="font-size:13px;color:var(--dim)">/20</span></div><div class="l">Conversations</div><div class="bar"><i style="width:'+Math.min(100,k.convos*5)+'%"></i></div></div>'+
    '<div class="kpi"><div class="n">'+k.active+'</div><div class="l">Active jobs</div></div>'+
    '<div class="kpi"><div class="n">$'+k.earned.toFixed(0)+'</div><div class="l">Fees approved</div></div></div>'+
    '<h2 class="sec">Call queue</h2>'+
    (due.length?due.map(cardFac).join(''):'<div class="empty">Queue clear. Check Radar for new leads.</div>')+
    '<h2 class="sec">Active jobs</h2>'+
    (act.length?act.map(cardJob).join(''):'<div class="empty">No active dispatches.</div>')+
    '<button class="b go fab" onclick="openNewJob()">+ New Dispatch</button>';
}
function cardFac(f){
  return '<div class="card" onclick="openFac(\''+f.id+'\')"><div class="r1">'+
   '<span class="pri '+esc(f.priority)+'">'+esc(f.priority)+'</span><span class="nm">'+esc(f.name)+'</span>'+
   '<span class="rt">'+(f.follow_up_date?('follow up '+fmt(f.follow_up_date)):esc(f.call_status.replace('_',' ')))+'</span></div>'+
   '<div class="meta">'+(f.phone?'<a href="tel:'+esc(f.phone)+'" onclick="event.stopPropagation()">'+esc(f.phone)+'</a> · ':'')+
   esc(f.city||'')+(f.pain_points?' · '+esc(f.pain_points.slice(0,70)):'')+'</div></div>';
}
function cardJob(d){
  const f=fac(d.facility_id),t=tech(d.tech_id);
  return '<div class="card" onclick="openJob(\''+d.id+'\')"><div class="r1">'+
   '<span class="st '+esc(d.status)+'">'+esc(d.status.replace('_',' '))+'</span><span class="nm">'+esc(f.name||'?')+'</span>'+
   '<span class="rt">$'+(+d.coordination_fee_usd||0).toFixed(0)+(d.fee_collected?' ✓':'')+'</span></div>'+
   '<div class="meta">'+esc(d.equipment_kind)+' · '+esc(t.name||'unassigned')+(d.issue?' · '+esc(d.issue.slice(0,60)):'')+'</div></div>';
}
function rPipeline(){
  const groups=['queue','not_called','no_answer','spoke','vendor_on_file','declined','client'];
  const lbl={queue:'Queue',not_called:'Not called',no_answer:'No answer',spoke:'Spoke',vendor_on_file:'Vendor on file',declined:'Declined',client:'CLIENT'};
  let list=F.slice();
  if(pipeFilter==='queue')list=list.filter(f=>['not_called','no_answer'].includes(f.call_status));
  else list=list.filter(f=>f.call_status===pipeFilter);
  list.sort((a,b)=>PRI_ORD[a.priority]-PRI_ORD[b.priority]||a.name.localeCompare(b.name));
  return '<div class="chips">'+groups.map(g=>{
    const n=g==='queue'?F.filter(f=>['not_called','no_answer'].includes(f.call_status)).length:F.filter(f=>f.call_status===g).length;
    return '<button class="'+(pipeFilter===g?'on':'')+'" onclick="pipeFilter=\''+g+'\';render()">'+lbl[g]+' '+n+'</button>'}).join('')+'</div>'+
    (list.length?list.map(cardFac).join(''):'<div class="empty">Nothing here.</div>');
}
function rJobs(){
  const filters=['active','requested','dispatched','on_site','completed','approved','cancelled','all'];
  let list=D.slice();
  if(jobFilter==='active')list=list.filter(d=>!['approved','cancelled'].includes(d.status));
  else if(jobFilter!=='all')list=list.filter(d=>d.status===jobFilter);
  return '<div class="chips">'+filters.map(x=>'<button class="'+(jobFilter===x?'on':'')+
   '" onclick="jobFilter=\''+x+'\';render()">'+x.replace('_',' ')+'</button>').join('')+'</div>'+
   (list.length?list.map(cardJob).join(''):'<div class="empty">No jobs.</div>')+
   '<button class="b go fab" onclick="openNewJob()">+ New Dispatch</button>';
}
function rTechs(){
  return '<div class="note">Dispatch guard is live: jobs physically can\'t be assigned to a tech whose docs don\'t cover the work. Recruit new techs in <a href="radar.html" style="color:var(--hazard)">Radar</a>.</div>'+
   (T.length?T.map(t=>{
     const gateOk=!!t.is_active&&t.coi_expires_on&&t.coi_expires_on>=new Date().toISOString().slice(0,10);
     const licOk=gateOk&&t.dps_license_number&&t.tops_verified_on&&
       (new Date()-new Date(t.tops_verified_on))/864e5<=90&&(!t.dps_license_expires_on||t.dps_license_expires_on>=new Date().toISOString().slice(0,10));
     return '<div class="card" onclick="openTech(\''+t.id+'\')"><div class="r1"><span class="nm">'+esc(t.name)+'</span>'+
      (t.is_active?'':'<span class="st">inactive</span>')+
      '<span class="rt">gate '+(gateOk?'<span class="ok">✓</span>':'<span class="no">✗</span>')+
      ' · licensed '+(licOk?'<span class="ok">✓</span>':'<span class="no">✗</span>')+'</span></div>'+
      '<div class="meta">'+(t.phone?'<a href="tel:'+esc(t.phone)+'" onclick="event.stopPropagation()">'+esc(t.phone)+'</a> · ':'')+
      esc((t.trades||[]).join(', '))+(t.company&&t.company!==t.name?' · '+esc(t.company):'')+'</div></div>'})
    .join(''):'<div class="empty">No techs yet — open Radar → Techs and start recruiting.</div>');
}
function rMetrics(){
  const k=kpis();
  const byStatus=s=>D.filter(d=>d.status===s).length;
  const done=D.filter(d=>['completed','approved'].includes(d.status));
  const ot=done.filter(d=>d.on_time===true).length, ft=done.filter(d=>d.first_try_approval===true).length;
  const collected=D.filter(d=>d.fee_collected).reduce((s,d)=>s+(+d.coordination_fee_usd||0),0);
  return '<div class="kpis">'+
   '<div class="kpi"><div class="n">'+k.convos+'/20</div><div class="l">Kill-criteria conversations</div><div class="bar"><i style="width:'+Math.min(100,k.convos*5)+'%"></i></div></div>'+
   '<div class="kpi"><div class="n">'+O.length+'</div><div class="l">Outreach touches</div></div>'+
   '<div class="kpi"><div class="n">'+F.filter(f=>f.call_status==='client').length+'</div><div class="l">Clients</div></div>'+
   '<div class="kpi"><div class="n">$'+collected.toFixed(0)+'</div><div class="l">Fees collected</div></div></div>'+
   '<h2 class="sec">Dispatch funnel</h2><table class="t"><tr><th>Status</th><th>Count</th></tr>'+
   ['requested','dispatched','on_site','completed','approved','cancelled'].map(s=>'<tr><td>'+s.replace('_',' ')+'</td><td>'+byStatus(s)+'</td></tr>').join('')+'</table>'+
   '<h2 class="sec">Tech performance ('+done.length+' finished jobs)</h2>'+
   '<div class="kpis"><div class="kpi"><div class="n">'+(done.length?Math.round(ot/done.length*100):0)+'%</div><div class="l">On-time</div></div>'+
   '<div class="kpi"><div class="n">'+(done.length?Math.round(ft/done.length*100):0)+'%</div><div class="l">First-try approval</div></div></div>';
}
function rTeam(){
  return (STAFF.length?'<table class="t"><tr><th>Name</th><th>Role</th><th>Scope</th><th></th></tr>'+
   STAFF.map(s=>'<tr><td>'+esc(s.full_name||s.email)+(s.is_primary?' ★':'')+'</td><td>'+esc(s.role)+'</td>'+
    '<td>'+esc(s.jobs_scope)+'</td><td>'+(s.is_primary?'':(
     (s.role==='pending'?'<button class="b" onclick="setRole(\''+s.user_id+'\',\'employee\')">Approve</button> <button class="b" onclick="setRole(\''+s.user_id+'\',\'owner\')">Full access</button>':
      '<button class="b" onclick="setScope(\''+s.user_id+'\',\''+(s.jobs_scope==='all'?'assigned':'all')+'\')">Scope: '+(s.jobs_scope==='all'?'assigned only':'all jobs')+'</button> '+
      '<button class="b warn" onclick="dropStaff(\''+s.user_id+'\')">Remove</button>')))+'</td></tr>').join('')+'</table>'
   :'<div class="empty">Just you. New hires appear here after they create an account.</div>');
}
function rSettings(){
  return '<label>Coordination fee (USD)</label><div class="row"><input id="feeIn" type="number" value="'+FEE+'">'+
   '<button class="b go" onclick="saveFee()">Save</button></div>'+
   '<div class="note">Fee auto-fills on every new dispatch. Docs kit: <a href="docs.html" style="color:var(--hazard)">agreements &amp; invoice</a>.</div>';
}

function openDrawer(html){$('drawer').innerHTML=html;$('drawer').classList.add('open');$('scrim').classList.add('open')}
function closeDrawer(){$('drawer').classList.remove('open');$('scrim').classList.remove('open')}
function dh(t){return '<div class="dh"><span class="t">'+t+'</span><button class="x" onclick="closeDrawer()">×</button></div>'}

function openFac(id){
  const f=fac(id);
  openDrawer(dh(esc(f.name))+
   '<div class="meta" style="margin-bottom:8px">'+(f.phone?'<a href="tel:'+esc(f.phone)+'" class="b go" style="text-decoration:none;display:inline-block;margin-right:6px">📞 Call</a>':'')+
   '<button class="b" onclick="openNewJob(\''+id+'\')">+ Dispatch here</button></div>'+
   '<div class="row"><div><label>Status</label><select id="f_cs">'+
   ['not_called','no_answer','spoke','vendor_on_file','declined','client'].map(s=>'<option '+(f.call_status===s?'selected':'')+'>'+s+'</option>').join('')+
   '</select></div><div><label>Priority</label><select id="f_pr">'+
   ['HOT','WARM','STANDARD','STRATEGIC'].map(s=>'<option '+(f.priority===s?'selected':'')+'>'+s+'</option>').join('')+'</select></div>'+
   '<div><label>Follow up</label><input id="f_fu" type="date" value="'+(f.follow_up_date||'')+'"></div></div>'+
   '<label>Contact</label><input id="f_ct" value="'+esc(f.contact_name||'')+'">'+
   '<label>Current vendor</label><input id="f_cv" value="'+esc(f.current_vendor||'')+'">'+
   '<label>Pain points</label><textarea id="f_pp" rows="2">'+esc(f.pain_points||'')+'</textarea>'+
   '<label>Notes</label><textarea id="f_no" rows="2">'+esc(f.notes||'')+'</textarea>'+
   '<button class="b go" onclick="saveFac(\''+id+'\')">Save</button>'+
   '<h2 class="sec">Log outreach</h2><div class="row"><div><label>Channel</label><select id="o_ch">'+
   ['call','sms','walk_in','email','other'].map(c=>'<option>'+c+'</option>').join('')+'</select></div>'+
   '<div><label>Spoke with</label><input id="o_sw"></div></div>'+
   '<label>Outcome</label><input id="o_oc" placeholder="e.g. interested, callback Tue, has vendor">'+
   '<label>Notes</label><textarea id="o_no" rows="2"></textarea>'+
   '<button class="b go" onclick="logOutreach(\''+id+'\')">Log it</button>'+
   '<h2 class="sec">History</h2>'+
   O.filter(o=>o.facility_id===id).slice(0,6).map(o=>'<div class="mut" style="margin-bottom:5px">'+
     fmt(o.contacted_at)+' · '+esc(o.channel)+(o.spoke_with?' · '+esc(o.spoke_with):'')+(o.outcome?' — '+esc(o.outcome):'')+'</div>').join('')||'');
}
async function saveFac(id){
  const {error}=await sb.from('facilities').update({call_status:$('f_cs').value,priority:$('f_pr').value,
   follow_up_date:$('f_fu').value||null,contact_name:$('f_ct').value||null,current_vendor:$('f_cv').value||null,
   pain_points:$('f_pp').value||null,notes:$('f_no').value||null}).eq('id',id);
  if(error){toast(error.message);return}
  toast('Saved ✓');closeDrawer();refresh();
}
async function logOutreach(id){
  const {error}=await sb.from('outreach_log').insert({facility_id:id,channel:$('o_ch').value,
   spoke_with:$('o_sw').value||null,outcome:$('o_oc').value||null,notes:$('o_no').value||null});
  if(error){toast(error.message);return}
  if($('o_sw').value&&$('f_cs').value==='not_called')await sb.from('facilities').update({call_status:'spoke'}).eq('id',id);
  toast('Logged ✓');closeDrawer();refresh();
}
function openNewJob(fid){
  openDrawer(dh('New dispatch')+
   '<label>Facility</label><select id="j_f">'+F.slice().sort((a,b)=>a.name.localeCompare(b.name))
    .map(f=>'<option value="'+f.id+'" '+(f.id===fid?'selected':'')+'>'+esc(f.name)+' — '+esc(f.city||'')+'</option>').join('')+'</select>'+
   '<div class="row"><div><label>Equipment</label><select id="j_k">'+
   ['gate','keypad','camera','access_control','other'].map(k=>'<option>'+k+'</option>').join('')+'</select></div>'+
   '<div><label>Tech</label><select id="j_t"><option value="">— pick later —</option>'+
   T.filter(t=>t.is_active).map(t=>'<option value="'+t.id+'">'+esc(t.name)+'</option>').join('')+'</select></div>'+
   '<div><label>Fee $</label><input id="j_fee" type="number" value="'+FEE+'"></div></div>'+
   '<label>Issue</label><textarea id="j_i" rows="2" placeholder="What\'s broken?"></textarea>'+
   '<button class="b go" onclick="createJob()">Create dispatch</button>'+
   '<div class="note">If the tech\'s documents don\'t cover this work, the system will refuse the assignment and tell you why.</div>');
}
async function createJob(){
  const row={facility_id:$('j_f').value,equipment_kind:$('j_k').value,issue:$('j_i').value||null,
   status:'requested',coordination_fee_usd:parseFloat($('j_fee').value)||FEE,assigned_to:me.uid};
  if($('j_t').value)row.tech_id=$('j_t').value;
  const {error}=await sb.from('dispatches').insert(row);
  if(error){toast(error.message);return}
  toast('Dispatch created ✓');closeDrawer();refresh();
}
function openJob(id){
  const d=D.find(x=>x.id===id); if(!d)return;
  const f=fac(d.facility_id);
  const owner=me.role==='owner';
  const nxt={requested:'dispatched',dispatched:'on_site',on_site:'completed'}[d.status];
  openDrawer(dh(esc(f.name||'Job'))+
   '<div class="meta" style="margin-bottom:8px"><span class="st '+esc(d.status)+'">'+esc(d.status.replace('_',' '))+'</span> · '+
   esc(d.equipment_kind)+' · fee $'+(+d.coordination_fee_usd||0).toFixed(0)+(d.fee_collected?' (collected)':'')+'</div>'+
   (d.issue?'<div class="mut" style="margin-bottom:8px">'+esc(d.issue)+'</div>':'')+
   '<label>Tech</label><select id="jd_t"><option value="">— unassigned —</option>'+
   T.filter(t=>t.is_active||t.id===d.tech_id).map(t=>'<option value="'+t.id+'" '+(t.id===d.tech_id?'selected':'')+'>'+esc(t.name)+'</option>').join('')+'</select>'+
   '<label>Photo evidence URL</label><input id="jd_ph" value="'+esc(d.photo_evidence_url||'')+'">'+
   '<label>Notes</label><textarea id="jd_no" rows="2">'+esc(d.notes||'')+'</textarea>'+
   (['completed'].includes(d.status)&&owner?
    '<div class="row"><label style="flex:1"><input type="checkbox" id="jd_ot" style="width:auto" '+(d.on_time?'checked':'')+'> On time</label>'+
    '<label style="flex:1"><input type="checkbox" id="jd_ft" style="width:auto" '+(d.first_try_approval?'checked':'')+'> First-try fix</label>'+
    '<label style="flex:1"><input type="checkbox" id="jd_fc" style="width:auto" '+(d.fee_collected?'checked':'')+'> Fee collected</label></div>':'')+
   '<div class="row" style="margin-top:8px">'+
   '<button class="b" onclick="saveJob(\''+id+'\')">Save</button>'+
   (nxt?'<button class="b go" onclick="advJob(\''+id+'\',\''+nxt+'\')">→ '+nxt.replace('_',' ')+'</button>':'')+
   (owner&&d.status==='completed'?'<button class="b go" onclick="advJob(\''+id+'\',\'approved\')">Approve ✓</button>':'')+
   (owner&&!['approved','cancelled'].includes(d.status)?'<button class="b warn" onclick="advJob(\''+id+'\',\'cancelled\')">Cancel</button>':'')+
   '</div>');
}
async function saveJob(id){
  const upd={tech_id:$('jd_t').value||null,photo_evidence_url:$('jd_ph').value||null,notes:$('jd_no').value||null};
  if($('jd_ot'))upd.on_time=$('jd_ot').checked;
  if($('jd_ft'))upd.first_try_approval=$('jd_ft').checked;
  if($('jd_fc'))upd.fee_collected=$('jd_fc').checked;
  const {error}=await sb.from('dispatches').update(upd).eq('id',id);
  if(error){toast(error.message);return}
  toast('Saved ✓');closeDrawer();refresh();
}
async function advJob(id,st){
  const upd={status:st};
  if(st==='dispatched')upd.dispatched_at=new Date().toISOString();
  if(st==='completed')upd.completed_at=new Date().toISOString();
  const {error}=await sb.from('dispatches').update(upd).eq('id',id);
  if(error){toast(error.message);return}
  toast(st.replace('_',' ')+' ✓');closeDrawer();refresh();
}
function openTech(id){
  const t=T.find(x=>x.id===id); if(!t)return;
  const trades=t.trades||[];
  openDrawer(dh(esc(t.name))+
   '<div class="row"><div><label>Name</label><input id="t_n" value="'+esc(t.name)+'"></div>'+
   '<div><label>Company</label><input id="t_c" value="'+esc(t.company||'')+'"></div>'+
   '<div><label>Phone</label><input id="t_p" value="'+esc(t.phone||'')+'"></div></div>'+
   '<label>Trades</label><div class="row">'+['gate','access_control','camera'].map(x=>
    '<label style="flex:1"><input type="checkbox" class="t_tr" value="'+x+'" style="width:auto" '+(trades.includes(x)?'checked':'')+'> '+x.replace('_',' ')+'</label>').join('')+'</div>'+
   '<div class="row"><div><label>GL insurance expires</label><input id="t_coi" type="date" value="'+(t.coi_expires_on||'')+'"></div>'+
   '<div><label>DPS license #</label><input id="t_dps" value="'+esc(t.dps_license_number||'')+'"></div>'+
   '<div><label>License expires</label><input id="t_dpx" type="date" value="'+(t.dps_license_expires_on||'')+'"></div></div>'+
   '<div class="row"><div><label>TOPS verified on</label><input id="t_tv" type="date" value="'+(t.tops_verified_on||'')+'"></div>'+
   '<div><label>Agreement signed</label><input id="t_ag" type="date" value="'+(t.agreement_signed_on||'')+'"></div></div>'+
   '<div class="row"><button class="b" onclick="$(\'t_tv\').value=new Date().toISOString().slice(0,10)">Verified in TOPS today</button>'+
   '<a class="b" style="text-decoration:none;text-align:center" target="_blank" href="https://tops.portal.texas.gov/psp-self-service/search/index">Open TOPS ↗</a></div>'+
   '<label style="margin-top:6px"><input type="checkbox" id="t_act" style="width:auto" '+(t.is_active?'checked':'')+'> Active (dispatchable)</label>'+
   '<label>Notes</label><textarea id="t_no" rows="2">'+esc(t.notes||'')+'</textarea>'+
   '<button class="b go" onclick="saveTech(\''+id+'\')">Save</button>');
}
async function saveTech(id){
  const trades=Array.from(document.querySelectorAll('.t_tr:checked')).map(x=>x.value);
  const {error}=await sb.from('techs').update({name:$('t_n').value,company:$('t_c').value||null,phone:$('t_p').value||null,
   trades,coi_expires_on:$('t_coi').value||null,dps_license_number:$('t_dps').value||null,
   dps_license_expires_on:$('t_dpx').value||null,tops_verified_on:$('t_tv').value||null,
   agreement_signed_on:$('t_ag').value||null,is_active:$('t_act').checked,notes:$('t_no').value||null}).eq('id',id);
  if(error){toast(error.message);return}
  toast('Saved ✓');closeDrawer();refresh();
}
async function setRole(uid,role){const {error}=await sb.from('dispatch_staff').update({role}).eq('user_id',uid);
  if(error){toast(error.message);return} toast('Updated ✓');await loadAll();render()}
async function setScope(uid,scope){const {error}=await sb.from('dispatch_staff').update({jobs_scope:scope}).eq('user_id',uid);
  if(error){toast(error.message);return} toast('Updated ✓');await loadAll();render()}
async function dropStaff(uid){if(!confirm('Remove this person\'s access?'))return;
  const {error}=await sb.from('dispatch_staff').delete().eq('user_id',uid);
  if(error){toast(error.message);return} toast('Removed');await loadAll();render()}
async function saveFee(){const v=$('feeIn').value;
  const {error}=await sb.from('app_settings').update({value:String(v)}).eq('key','booking_fee_usd');
  if(error){toast(error.message);return} FEE=parseFloat(v);toast('Fee saved ✓')}

boot();
</script>
</body>
</html>
