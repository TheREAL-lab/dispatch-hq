<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar — Texas Gate Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#141414;--panel:#1d1d1d;--line:#2c2c2c;--orange:#ff6a00;--hazard:#ffc400;
        --dim:#9a9a9a;--bright:#f2f2f2;--good:#2ecc71;--warm:#ffb03a;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--bright);font-family:'Archivo',system-ui,sans-serif;padding-bottom:70px}
  .wrap{max-width:860px;margin:0 auto;padding:0 14px}
  header.top{padding:18px 0 12px;border-bottom:4px solid var(--orange);
    background:repeating-linear-gradient(-45deg,transparent 0 14px,rgba(255,196,0,.06) 14px 28px)}
  .eyebrow{font-stretch:70%;font-weight:700;letter-spacing:.22em;font-size:11px;color:var(--orange);text-transform:uppercase}
  h1{font-stretch:66%;font-weight:900;font-size:clamp(26px,6vw,38px);text-transform:uppercase;line-height:1}
  .navlinks{margin-top:8px;display:flex;gap:14px;font-size:13px}
  .navlinks a{color:var(--dim);text-decoration:none;font-weight:700}
  .navlinks a:hover{color:var(--orange)}
  .tabs{display:flex;gap:8px;margin:16px 0 6px}
  .tab{flex:1;text-align:center;padding:11px 8px;background:var(--panel);border:1px solid var(--line);
       border-radius:7px;font-stretch:70%;font-weight:800;letter-spacing:.08em;font-size:14px;
       text-transform:uppercase;cursor:pointer;color:var(--dim)}
  .tab.on{color:#140900;background:var(--orange);border-color:var(--orange)}
  .counts{color:var(--dim);font-size:12px;margin:6px 2px 12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:13px 14px;margin-bottom:10px}
  .card.hot{border-left:4px solid var(--orange)}
  .row1{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .cname{font-weight:800;font-size:16px}
  .score{margin-left:auto;font-stretch:70%;font-weight:900;font-size:18px;color:var(--orange)}
  .meta{color:var(--dim);font-size:12.5px;margin-top:3px}
  .meta a{color:var(--bright);text-decoration:none;font-weight:700}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:11px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:4px;
        background:#262626;border:1px solid #3a3a3a;color:var(--dim);text-transform:uppercase}
  .chip.pain{background:#2a1503;border-color:var(--orange);color:var(--orange)}
  .chip.lic{background:#201b06;border-color:var(--hazard);color:var(--hazard)}
  .ev{margin-top:8px;padding:8px 10px;background:#171717;border-left:3px solid var(--hazard);
      color:#cfc9b6;font-size:12.5px;line-height:1.45;border-radius:0 5px 5px 0;font-style:italic}
  .acts{display:flex;gap:8px;margin-top:11px}
  button.b{font:inherit;font-weight:800;font-size:12.5px;letter-spacing:.05em;padding:9px 14px;
           border-radius:6px;cursor:pointer;border:1px solid #3a3a3a;background:#262626;color:var(--bright)}
  button.b.go{background:var(--orange);border-color:var(--orange);color:#140900}
  button.b:disabled{opacity:.45;cursor:default}
  .note{margin:14px 0;padding:10px 12px;border-left:4px solid var(--hazard);background:#221d0d;
        color:#ffe9a8;font-size:12.5px;line-height:1.5;border-radius:0 6px 6px 0}
  .empty{color:var(--dim);text-align:center;padding:34px 10px;font-size:14px}
  #login{max-width:360px;margin:60px auto;background:var(--panel);border:1px solid var(--line);
         border-radius:10px;padding:22px}
  #login h2{font-stretch:70%;font-weight:900;text-transform:uppercase;margin-bottom:12px}
  #login input{width:100%;padding:11px;margin-bottom:10px;background:#111;border:1px solid #3a3a3a;
               border-radius:6px;color:var(--bright);font:inherit}
  #login button{width:100%}
  .err{color:#ff7a7a;font-size:12.5px;margin-top:8px;min-height:16px}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--orange);
         color:#140900;font-weight:800;padding:10px 18px;border-radius:7px;font-size:13.5px;
         opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">Texas Gate Dispatch · Targeting</div>
    <h1>Radar</h1>
    <div class="navlinks"><a href="index.html">← Command</a><a href="docs.html">Docs</a></div>
  </header>

  <div id="login" style="display:none">
    <h2>Sign in</h2>
    <input id="em" type="email" placeholder="Email" autocomplete="username">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
    <button class="b go" onclick="doLogin()">Sign in</button>
    <div class="err" id="lerr"></div>
  </div>

  <div id="app" style="display:none">
    <div class="tabs">
      <div class="tab on" id="tab-leads" onclick="setTab('leads')">Leads</div>
      <div class="tab" id="tab-techs" onclick="setTab('techs')">Techs</div>
    </div>
    <div class="counts" id="counts"></div>
    <div id="list"></div>
    <div class="note" id="sweepnote">New candidates are found by sweep. Sweeps currently run through Claude on request;
      the in-app sweep button arrives with the Google API key setup.</div>
  </div>
  <div class="err" id="booterr" style="padding:20px 4px"></div>
</div>
<div class="toast" id="toast"></div>

<script>
let sb=null, tab='leads', rows=[];
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

async function boot(){
  try{
    const src=await fetch('index.html').then(r=>r.text());
    const url=(src.match(/https:\/\/[a-z0-9]+\.supabase\.co/)||[])[0];
    const key=(src.match(/sb_publishable_[A-Za-z0-9_\-]+/)||src.match(/eyJ[A-Za-z0-9_\-\.]{60,}/)||[])[0];
    if(!url||!key){$('booterr').textContent='Could not read connection config from index.html.';return;}
    sb=window.supabase.createClient(url,key);
    const {data:{session}}=await sb.auth.getSession();
    if(session){$('app').style.display='block';load();}
    else{$('login').style.display='block';}
  }catch(e){$('booterr').textContent='Boot error: '+e.message;}
}

async function doLogin(){
  $('lerr').textContent='';
  const {error}=await sb.auth.signInWithPassword({email:$('em').value.trim(),password:$('pw').value});
  if(error){$('lerr').textContent=error.message;return;}
  $('login').style.display='none';$('app').style.display='block';load();
}

function setTab(t){tab=t;$('tab-leads').classList.toggle('on',t==='leads');
  $('tab-techs').classList.toggle('on',t==='techs');load();}

async function load(){
  $('list').innerHTML='<div class="empty">Loading…</div>';
  const table=tab==='leads'?'lead_candidates':'tech_candidates';
  const {data,error}=await sb.from(table).select('*').eq('status','new').order('score',{ascending:false});
  if(error){$('list').innerHTML='<div class="empty">'+esc(error.message)+'</div>';return;}
  rows=data||[];
  const {count:pc}=await sb.from(table).select('*',{count:'exact',head:true}).eq('status','promoted');
  $('counts').textContent=rows.length+' new · '+(pc||0)+' promoted';
  render();
}

function render(){
  if(!rows.length){$('list').innerHTML='<div class="empty">No new candidates. Ask Claude to run a sweep.</div>';return;}
  $('list').innerHTML=rows.map(r=>{
    const bd=r.score_breakdown||{};
    const dist=bd.distance_mi?(' · '+bd.distance_mi+' mi'):'';
    const tel=r.phone?('<a href="tel:'+esc(r.phone)+'">'+esc(r.phone)+'</a> · '):'';
    let chips='',ev='',hot='';
    if(tab==='leads'){
      if(r.pain_recent){chips+='<span class="chip pain">Recent gate pain</span>';hot=' hot';}
      else if(r.pain_signal){chips+='<span class="chip pain">Past gate pain</span>';}
      if((bd.small_operator||0)>0)chips+='<span class="chip">Small operator</span>';
      if((bd.low_tech||0)>0)chips+='<span class="chip">Low tech</span>';
      const e=(r.pain_evidence||[])[0];
      if(e&&e.snippet)ev='<div class="ev">“'+esc(e.snippet)+'”</div>';
    }else{
      (r.capabilities||[]).forEach(c=>chips+='<span class="chip">'+esc(c.replace('_',' '))+'</span>');
      if(r.rating)chips+='<span class="chip">★ '+esc(r.rating)+'</span>';
      if(r.license_likely)chips+='<a class="chip lic" style="text-decoration:none" target="_blank" href="https://tops.portal.texas.gov/psp-self-service/search/index">Verify DPS in TOPS ↗</a>';
      const e=(r.capability_evidence||[])[0];
      if(e&&e.snippet)ev='<div class="ev">“'+esc(e.snippet)+'”</div>';
      if(r.score>=85)hot=' hot';
    }
    return '<div class="card'+hot+'"><div class="row1"><span class="cname">'+esc(r.name)+'</span>'+
      '<span class="score">'+r.score+'</span></div>'+
      '<div class="meta">'+tel+esc(r.city||'')+dist+'</div>'+
      (chips?'<div class="chips">'+chips+'</div>':'')+ev+
      '<div class="acts"><button class="b go" onclick="promote(\''+r.id+'\',this)">'+
      (tab==='leads'?'Promote to Prospects':'Add to Tech Roster')+'</button>'+
      '<button class="b" onclick="dismiss(\''+r.id+'\',this)">Dismiss</button></div></div>';
  }).join('');
}

async function promote(id,btn){
  btn.disabled=true;
  const fn=tab==='leads'?'lead_promote':'tech_promote';
  const {error}=await sb.rpc(fn,{p_candidate_id:id});
  if(error){btn.disabled=false;toast('Error: '+error.message);return;}
  toast(tab==='leads'?'Added to Prospects ✓':'Added to roster (inactive until docs on file) ✓');
  load();
}

async function dismiss(id,btn){
  btn.disabled=true;
  const table=tab==='leads'?'lead_candidates':'tech_candidates';
  const {error}=await sb.from(table).update({status:'dismissed'}).eq('id',id);
  if(error){btn.disabled=false;toast('Error: '+error.message);return;}
  load();
}

boot();
</script>
</body>
</html>
